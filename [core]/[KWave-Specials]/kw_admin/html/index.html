<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="admin-menu" class="hidden">
        <div class="admin-container">
            <!-- Header -->
            <div class="admin-header">
                <div class="admin-title-section">
                    <span class="admin-title">ADMIN PANEL</span>
                    <span class="admin-subtitle" id="admin-group">ADMIN</span>
                </div>
                <button class="btn-close" id="btn-close">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M1 1L7 7M13 13L7 7M7 7L13 1L1 13" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </div>
            
            <!-- Tabs -->
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="self">
                    <span class="tab-icon">⚡</span>
                    <span class="tab-label">SELF</span>
                </button>
                <button class="tab-btn" data-tab="players">
                    <span class="tab-icon">👥</span>
                    <span class="tab-label">PLAYERS</span>
                </button>
                <button class="tab-btn" data-tab="give">
                    <span class="tab-icon">🎁</span>
                    <span class="tab-label">GIVE</span>
                </button>
                <button class="tab-btn" data-tab="vehicles">
                    <span class="tab-icon">🚗</span>
                    <span class="tab-label">VEHICLES</span>
                </button>
            </div>
            
            <!-- Self Tab -->
            <div id="tab-self" class="tab-content active">
                <div class="section-title">PERSONAL ACTIONS</div>
                <div class="action-grid">
                    <button class="action-btn" data-action="noclip" data-toggle="true">
                        <span class="action-icon">✈️</span>
                        <span class="action-name">NOCLIP</span>
                        <span class="action-status">OFF</span>
                    </button>
                    <button class="action-btn" data-action="invisible" data-toggle="true">
                        <span class="action-icon">👻</span>
                        <span class="action-name">INVISIBLE</span>
                        <span class="action-status">OFF</span>
                    </button>
                    <button class="action-btn" data-action="godmode" data-toggle="true">
                        <span class="action-icon">🛡️</span>
                        <span class="action-name">GODMODE</span>
                        <span class="action-status">OFF</span>
                    </button>
                    <button class="action-btn" data-action="heal">
                        <span class="action-icon">❤️</span>
                        <span class="action-name">HEAL</span>
                    </button>
                    <button class="action-btn" data-action="armor">
                        <span class="action-icon">🦺</span>
                        <span class="action-name">ARMOR</span>
                    </button>
                    <button class="action-btn" data-action="revive">
                        <span class="action-icon">💉</span>
                        <span class="action-name">REVIVE</span>
                    </button>
                    <button class="action-btn" data-action="vehiclegod" data-toggle="true">
                        <span class="action-icon">🚙</span>
                        <span class="action-name">CAR GOD</span>
                        <span class="action-status">OFF</span>
                    </button>
                    <button class="action-btn" data-action="repair">
                        <span class="action-icon">🔧</span>
                        <span class="action-name">REPAIR</span>
                    </button>
                    <button class="action-btn" data-action="spectate" data-toggle="true">
                        <span class="action-icon">👁️</span>
                        <span class="action-name">SPECTATE</span>
                        <span class="action-status">OFF</span>
                    </button>
                    <button class="action-btn" data-action="tpm">
                        <span class="action-icon">📍</span>
                        <span class="action-name">TP TO WAYPOINT</span>
                    </button>
                    <button class="action-btn" data-action="clearloadout">
                        <span class="action-icon">🗑️</span>
                        <span class="action-name">CLEAR WEAPONS</span>
                    </button>
                    <button class="action-btn" data-action="clean">
                        <span class="action-icon">🧼</span>
                        <span class="action-name">CLEAN PED</span>
                    </button>
                </div>
            </div>
            
            <!-- Players Tab -->
            <div id="tab-players" class="tab-content">
                <div class="players-section">
                    <div class="players-header">
                        <div class="section-title">ONLINE PLAYERS <span class="count" id="player-count">0</span></div>
                        <button class="btn-refresh" id="btn-refresh" title="Refresh List">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M14 8C14 11.3137 11.3137 14 8 14C4.68629 14 2 11.3137 2 8C2 4.68629 4.68629 2 8 2C10.2091 2 12.2091 3.10457 13.4142 4.85786" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M14 2V6H10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div class="players-list" id="players-list"></div>
                </div>
                
                <div class="player-actions-panel">
                    <div class="section-title">SELECTED PLAYER ACTIONS</div>
                    <select id="target-player" class="styled-select">
                        <option value="">Select a player...</option>
                    </select>
                    
                    <div class="action-groups">
                        <div class="action-group">
                            <div class="group-label">TELEPORT</div>
                            <div class="action-row">
                                <button class="btn-action" data-action="goto">
                                    <span class="btn-icon">📍</span>
                                    <span>GOTO</span>
                                </button>
                                <button class="btn-action" data-action="bring">
                                    <span class="btn-icon">🎯</span>
                                    <span>BRING</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="action-group">
                            <div class="group-label">MODERATION</div>
                            <div class="action-row">
                                <button class="btn-action" data-action="freeze">
                                    <span class="btn-icon">❄️</span>
                                    <span>FREEZE</span>
                                </button>
                                <button class="btn-action warning" data-action="slay">
                                    <span class="btn-icon">💀</span>
                                    <span>SLAY</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="action-group">
                            <div class="group-label">PUNISHMENT</div>
                            <div class="action-row">
                                <button class="btn-action danger" data-action="kick">
                                    <span class="btn-icon">👢</span>
                                    <span>KICK</span>
                                </button>
                                <button class="btn-action danger" data-action="ban">
                                    <span class="btn-icon">🔨</span>
                                    <span>BAN</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Give Tab -->
            <div id="tab-give" class="tab-content">
                <div class="give-section">
                    <div class="section-title">SELECT TARGET</div>
                    <select id="give-target" class="styled-select">
                        <option value="">Select a player...</option>
                        <option value="self">🎯 YOURSELF</option>
                    </select>
                </div>
                
                <div class="give-section">
                    <div class="section-title">SELECT ITEM / WEAPON</div>
                    <div class="searchable-select">
                        <input type="text" id="item-search" class="search-input" placeholder="🔍 Search items or weapons..." autocomplete="off">
                        <div class="search-results" id="search-results"></div>
                    </div>
                    <div class="selected-item" id="selected-item">
                        <span class="no-selection">No item selected</span>
                    </div>
                </div>
                
                <div class="give-section">
                    <div class="section-title">AMOUNT</div>
                    <input type="number" id="give-amount" class="styled-input" placeholder="1" value="1" min="1" max="1000">
                </div>
                
                <div class="give-section">
                    <div class="section-title">QUICK CATEGORIES</div>
                    <div class="category-tags">
                        <button class="tag" data-cat="weapons">🔫 Weapons</button>
                        <button class="tag" data-cat="ammo">🔋 Ammo</button>
                        <button class="tag" data-cat="food">🍔 Food</button>
                        <button class="tag" data-cat="drink">🥤 Drink</button>
                        <button class="tag" data-cat="medical">💊 Medical</button>
                        <button class="tag" data-cat="tools">🛠️ Tools</button>
                        <button class="tag" data-cat="money">💰 Money</button>
                    </div>
                </div>
                
                <button class="btn-give" id="btn-give">
                    <span class="btn-icon">🎁</span>
                    <span>GIVE ITEM</span>
                </button>
            </div>
            
            <!-- Vehicles Tab -->
            <div id="tab-vehicles" class="tab-content">
                <div class="vehicles-section">
                    <div class="section-title">SPAWN VEHICLE</div>
                    <div class="searchable-select">
                        <input type="text" id="vehicle-search" class="search-input" placeholder="🔍 Search vehicle model..." autocomplete="off">
                        <div class="search-results" id="vehicle-results"></div>
                    </div>
                    <button class="btn-give" id="btn-spawn-vehicle">
                        <span class="btn-icon">🚗</span>
                        <span>SPAWN VEHICLE</span>
                    </button>
                </div>
                
                <div class="vehicles-section">
                    <div class="section-title">QUICK SPAWNS</div>
                    <div class="vehicle-grid">
                        <button class="vehicle-btn" data-model="adder">🏎️ Adder</button>
                        <button class="vehicle-btn" data-model="zentorno">🚘 Zentorno</button>
                        <button class="vehicle-btn" data-model="t20">🏁 T20</button>
                        <button class="vehicle-btn" data-model="osiris">🚙 Osiris</button>
                        <button class="vehicle-btn" data-model="bullet">🏎️ Bullet</button>
                        <button class="vehicle-btn" data-model="cheetah">🐆 Cheetah</button>
                        <button class="vehicle-btn" data-model="entityxf">⚡ EntityXF</button>
                        <button class="vehicle-btn" data-model="infernus">🔥 Infernus</button>
                        <button class="vehicle-btn" data-model="vacca">🚗 Vacca</button>
                        <button class="vehicle-btn" data-model="massacro">💪 Massacro</button>
                        <button class="vehicle-btn" data-model="turismor">🇮🇹 Turismo</button>
                        <button class="vehicle-btn" data-model="police">🚓 Police</button>
                        <button class="vehicle-btn" data-model="police2">🚔 Police 2</button>
                        <button class="vehicle-btn" data-model="police3">🚓 Police 3</button>
                        <button class="vehicle-btn" data-model="sheriff">👮 Sheriff</button>
                        <button class="vehicle-btn" data-model="ambulance">🚑 Ambulance</button>
                        <button class="vehicle-btn" data-model="firetruk">🚒 Firetruck</button>
                        <button class="vehicle-btn" data-model="buzzard">🚁 Buzzard</button>
                        <button class="vehicle-btn" data-model="cargobob">🚁 Cargobob</button>
                        <button class="vehicle-btn" data-model="maverick">🚁 Maverick</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div id="modal" class="hidden">
        <div class="modal-overlay"></div>
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">CONFIRM ACTION</h3>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body">
                <p id="modal-message" class="modal-message"></p>
                <input type="text" id="modal-input" class="styled-input" placeholder="Enter reason...">
                <input type="number" id="modal-duration" class="styled-input" placeholder="Hours (0 = permanent)">
            </div>
            <div class="modal-footer">
                <button class="btn-modal cancel" id="modal-cancel">CANCEL</button>
                <button class="btn-modal confirm" id="modal-confirm">CONFIRM</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification Container -->
    <div id="toast-container"></div>
    
    <script src="app.js"></script>
</body>
</html>
