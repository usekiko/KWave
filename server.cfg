# ─────────────────────────────────────────────────────
#  NETWORK ENDPOINTS
# ─────────────────────────────────────────────────────
# Bind to all interfaces. Only change if you have multiple NICs.
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# ─────────────────────────────────────────────────────
#  SERVER IDENTITY
# ─────────────────────────────────────────────────────
sv_hostname "KWave Framework [DEV] - localhost"
sets sv_projectName "KWave Framework"
sets sv_projectDesc "KWave - A refreshed FiveM RP framework powered by PostgreSQL"
sets tags "kwave, roleplay, postgresql, framework, dev"

# ─────────────────────────────────────────────────────
#  LICENSE & STEAM
#  Get a free key at: https://keymaster.fivem.net
#  For LOCAL TESTING only, you can use sv_lan true below
# ─────────────────────────────────────────────────────
sv_licenseKey "cfxk_2kKhRpwJMUQE4UFf2i7t_4I51XB"
# set steam_webApiKey ""  # Optional: Steam API for Steam auth

# ─────────────────────────────────────────────────────
#  LOCAL DEVELOPMENT MODE
#  sv_lan bypasses license key checks for LAN/localhost
# ─────────────────────────────────────────────────────
sv_lan false
sv_endpointPrivacy false

# ─────────────────────────────────────────────────────
#  SERVER LIMITS & ONESYNC
# ─────────────────────────────────────────────────────
sv_maxclients 48
## [txAdmin CFG validator]: onesync MUST only be set in the txAdmin settings page.
# set onesync on

# ─────────────────────────────────────────────────────
#  GAME BUILD
#  3095 = mp2023_02 (The Chop Shop) — latest stable
# ─────────────────────────────────────────────────────
sv_enforceGameBuild 3095

# ─────────────────────────────────────────────────────
#  POSTGRESQL CONNECTION
#  Format: postgresql://user:password@host/database
#  sslmode=disable is safe for localhost
# ─────────────────────────────────────────────────────
set pgsql_connection_string "postgresql://postgres:kwave_password@localhost/kwave?sslmode=disable"
set pgsql_debug false

# ─────────────────────────────────────────────────────
#  KWAVE FRAMEWORK CONFIG
# ─────────────────────────────────────────────────────
setr kw:locale "en"
set resources_useSystemChat true

# ─────────────────────────────────────────────────────
#  ACE PERMISSIONS
# ─────────────────────────────────────────────────────
add_principal group.admin group.user
add_ace group.admin command allow
add_ace group.admin command.quit deny
add_ace resource.kw_core command.add_ace allow
add_ace resource.kw_core command.add_principal allow
add_ace resource.kw_core command.remove_principal allow
add_ace resource.kw_core command.stop allow

# Give yourself admin — replace with your real Steam/License identifier
# Uncomment and replace YOUR_LICENSE_IDENTIFIER:
add_principal identifier.fivem:16230799 group.admin
add_principal identifier.discord:465618379642896394 group.admin
add_principal identifier.ip:192.168.56.1 group.admin
add_principal identifier.ip:127.0.0.1 group.admin

# ─────────────────────────────────────────────────────
#  CORE FiveM RESOURCES (always first)
# ─────────────────────────────────────────────────────
ensure spawnmanager
ensure hardcap
ensure baseevents
ensure sessionmanager

# ─────────────────────────────────────────────────────
#  OX STACK (database driver must be first)
# ─────────────────────────────────────────────────────
ensure oxpsql
ensure ox_lib
ensure ox_target

# ─────────────────────────────────────────────────────
#  OX INVENTORY
# ─────────────────────────────────────────────────────
setr inventory:framework "kw"
setr inventory:target true

# ─────────────────────────────────────────────────────
#  KWAVE FRAMEWORK CORE
# ─────────────────────────────────────────────────────
ensure kw_core

# ─────────────────────────────────────────────────────
#  OX INVENTORY (after kw_core - needs player events)
# ─────────────────────────────────────────────────────
ensure ox_inventory

# ─────────────────────────────────────────────────────
#  KWAVE FRAMEWORK MODULES
#  [core] starts ALL resources inside the folder
#  kw_inventory = fallback F2 inventory, disabled since we use ox_inventory
# ─────────────────────────────────────────────────────
stop kw_inventory
ensure [core]

# ─────────────────────────────────────────────────────
#  OX RESOURCE FOLDER
# ─────────────────────────────────────────────────────
ensure [OX]


## OX Security Advisory
set ox:ignoreSecurityAdvisory "[\"stateBagStrictMode\"] "
