<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTF Notify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="notification-container"></div>
    
    <!-- Audio elements for notification sounds -->
    <audio id="sound-success" src="sounds/success.mp3" preload="auto"></audio>
    <audio id="sound-error" src="sounds/error.mp3" preload="auto"></audio>
    <audio id="sound-warning" src="sounds/warning.mp3" preload="auto"></audio>
    <audio id="sound-info" src="sounds/info.mp3" preload="auto"></audio>
    <audio id="sound-announcement" src="sounds/announcement.mp3" preload="auto"></audio>
    
    <script src="app.js"></script>
</body>
</html>
