<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTF Loading Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #audio-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        #audio-indicator svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        #audio-indicator.hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="bg-video" autoplay muted loop playsinline>
            <source src="video/background.mp4" type="video/mp4">
        </video>
    </div>

    <div id="audio-indicator">
        <!-- Muted icon -->
        <svg id="icon-muted" viewBox="0 0 24 24" style="display: block;">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
        <!-- Unmuted icon -->
        <svg id="icon-unmuted" viewBox="0 0 24 24" style="display: none;">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const videoContainer = document.getElementById('video-container');
        const audioIndicator = document.getElementById('audio-indicator');
        const iconMuted = document.getElementById('icon-muted');
        const iconUnmuted = document.getElementById('icon-unmuted');

        let indicatorTimeout;

        function toggleAudio() {
            video.muted = !video.muted;
            updateIndicator();
            showIndicator();
        }

        function updateIndicator() {
            if (video.muted) {
                iconMuted.style.display = 'block';
                iconUnmuted.style.display = 'none';
            } else {
                iconMuted.style.display = 'none';
                iconUnmuted.style.display = 'block';
            }
        }

        function showIndicator() {
            audioIndicator.classList.remove('hidden');
            clearTimeout(indicatorTimeout);
            indicatorTimeout = setTimeout(() => {
                audioIndicator.classList.add('hidden');
            }, 2000);
        }

        // Spacebar to toggle audio
        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') {
                event.preventDefault();
                toggleAudio();
            }
        });

        // Click to toggle audio
        videoContainer.addEventListener('click', function() {
            toggleAudio();
        });

        // Initial state
        updateIndicator();
        showIndicator();
    </script>
</body>
</html>
